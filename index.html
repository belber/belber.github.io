---
layout: default
---

<div id="app">
  <!-- 左栏：文章列表 -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-row">
        <svg class="sidebar-logo" width="28" height="28" viewBox="0 0 80 80">
          <rect x="4" y="4" width="72" height="72" rx="16" fill="var(--primary)"/>
          <text x="40" y="54" text-anchor="middle" font-size="36" font-weight="600" fill="#fff" font-family="serif">蜉</text>
        </svg>
        <h1 class="site-title"><a href="/">{{ site.title }}</a></h1>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="切换侧栏">◀</button>
      </div>
    </div>

    <!-- 月份导航 -->
    <nav id="month-nav" class="month-nav">
      <!-- JS 动态渲染 -->
    </nav>

    <!-- 文章列表 -->
    <div id="post-list" class="post-list">
      <!-- JS 按日期分组渲染 -->
    </div>

    <div class="sidebar-footer">
      <div class="theme-picker">
        <button id="theme-toggle" class="theme-toggle" aria-label="切换主题" title="切换主题">◑</button>
        <div id="theme-popover" class="theme-popover" style="display:none">
          <button class="theme-dot theme-dot-warmgray active" data-theme="warmgray" title="暖灰"></button>
          <button class="theme-dot theme-dot-blue" data-theme="blue" title="浅蓝"></button>
          <button class="theme-dot theme-dot-purple" data-theme="purple" title="浅紫"></button>
        </div>
      </div>
      <a href="/admin/" class="admin-gear" aria-label="管理">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
    </div>
  </aside>

  <div id="sidebar-resize-handle" class="sidebar-resize-handle"></div>

  <!-- 右栏：文章内容 -->
  <main id="content">
    <div id="welcome-area" class="welcome-area">
      <div class="welcome-hero" style="background-image:url(/assets/images/hero-bg.jpg)"></div>
      <div class="welcome-body">
        <div class="welcome-dash">— 蜉蝣人生 —</div>
        <blockquote class="welcome-quote">
          "人生大部分时间都是在寻找，寻找喜欢做的事情，寻找需要做的事情"
        </blockquote>
        <div class="welcome-divider"></div>
        <div class="welcome-stats">
          <div class="stat-card">
            <span class="stat-number" id="stat-posts">0</span>
            <span class="stat-label">文章</span>
          </div>
          <div class="stat-card">
            <span class="stat-number" id="stat-words">0</span>
            <span class="stat-label">本月字数</span>
          </div>
          <div class="stat-card">
            <span class="stat-number" id="stat-days">0</span>
            <span class="stat-label">运行天数</span>
          </div>
        </div>
      </div>
    </div>
    <div id="post-display" class="post-display" style="display:none;">
      <!-- JS 加载的文章内容将放在这里 -->
    </div>
  </main>
</div>

<script>
  // 将文章数据作为 JSON 嵌入页面，供 JS 使用
  window.__POSTS_DATA__ = [
    {% for post in site.posts %}
    {
      "title": {{ post.title | jsonify }},
      "date": "{{ post.date | date_to_xmlschema }}",
      "url": "{{ post.url | relative_url }}",
      "excerpt": {{ post.excerpt | jsonify }},
      "char_count": {{ post.content | strip_html | size }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  // 首页统计
  (function calcStats() {
    var posts = window.__POSTS_DATA__ || [];
    document.getElementById('stat-posts').textContent = posts.length;

    var now = new Date();
    var thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    var monthWords = 0;
    posts.forEach(function(p) {
      if (p.date && p.date.substring(0, 7) === thisMonth) {
        monthWords += p.char_count || 0;
      }
    });
    document.getElementById('stat-words').textContent = monthWords.toLocaleString();

    if (posts.length > 0) {
      var first = new Date(posts[posts.length - 1].date);
      var days = Math.floor((now - first) / (1000 * 60 * 60 * 24)) + 1;
      document.getElementById('stat-days').textContent = days;
    } else {
      document.getElementById('stat-days').textContent = 1;
    }
  })();
</script>
