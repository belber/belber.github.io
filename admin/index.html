<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发文 - 蜉蝣人生</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><rect x='4' y='4' width='72' height='72' rx='16' fill='%23a594dd'/><text x='40' y='52' text-anchor='middle' font-size='36' font-weight='600' fill='white' font-family='serif'>蜉</text></svg>">
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    body { background: #fff; }
    #app { max-width: 100%; margin: 0 auto; padding: 40px 20px; display: block; }
    @media (min-width: 900px) {
      #app { max-width: 680px; padding: 60px 40px; }
      textarea { min-height: 360px; }
      .login-prompt { padding: 120px 20px; }
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; color: #2b2b2b; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #2b2b2b; margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #e0d5c0; border-radius: 8px; font-size: 15px; font-family: inherit; box-sizing: border-box; outline: none; transition: border-color 0.15s; }
    input:focus, textarea:focus { border-color: #a594dd; }
    textarea { min-height: 200px; resize: vertical; line-height: 1.7; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: opacity 0.15s; }
    .btn-primary { background: #a594dd; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; color: #a594dd; border: 1px solid #a594dd; }
    .btn-outline:hover { background: #f8f4fc; }
    .status { margin-top: 12px; font-size: 13px; color: #666; padding: 8px 12px; border-radius: 6px; display: none; }
    .status.success { display: block; background: #ccd5ae; color: #2b2b2b; }
    .status.error { display: block; background:#f5d0d0; color:#8b0000; }
    .status.info { display: block; background:#f8f4fc; color:#2b2b2b; }
    .login-prompt { text-align: center; padding: 80px 20px; }
    .login-prompt h2 { font-size: 18px; font-weight: 400; color: #2b2b2b; margin-bottom: 20px; }
    .login-prompt .sub { font-size: 14px; color: #999; margin-top: 12px; line-height: 1.6; }
    .editor-area { display: none; }
    .back-link { font-size: 13px; color: #999; margin-bottom: 16px; display: block; }
    .back-link:hover { color: #a594dd; }
    .token-input-wrap { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
    .token-input-wrap input { width: 340px; max-width: 100%; }
    .help-text { font-size: 12px; color: #999; margin-top: 16px; line-height: 1.6; }
    .help-text a { color: #a594dd; }
    .posts-view { display: none; }
    .posts-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .posts-toolbar h1 { margin-bottom: 0; }
    .posts-list-admin { display: flex; flex-direction: column; gap: 4px; }
    .post-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border: 1px solid #e8e0f0; border-radius: 8px; transition: background 0.15s; }
    .post-row:hover { background: #f8f4fc; }
    .post-row .post-info { flex: 1; min-width: 0; }
    .post-row .post-date { font-size: 12px; color: #999; }
    .post-row .post-name { font-size: 14px; color: #2b2b2b; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .post-row .post-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .post-row .post-actions button { padding: 6px 14px; font-size: 13px; }
    .btn-danger { background: #e57373; color: #fff; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .nav-tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid #e8e0f0; padding-bottom: 0; }
    .nav-tab { padding: 8px 18px; border: none; background: transparent; color: #999; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
    .nav-tab:hover { color: #2b2b2b; }
    .nav-tab.active { color: #a594dd; border-bottom-color: #a594dd; font-weight: 500; }
    .empty-state { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }
    .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; align-items: center; justify-content: center; }
    .confirm-overlay.active { display: flex; }
    .confirm-box { background: #fff; border-radius: 12px; padding: 24px; max-width: 380px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
    .confirm-box h3 { font-size: 16px; margin-bottom: 8px; color: #2b2b2b; }
    .confirm-box p { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
    .confirm-box .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .admin-header { display: none; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .admin-header .back-link { margin-bottom: 0; }
    .logout-btn { font-size: 13px; color: #999; background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    .logout-btn:hover { color: #a594dd; background: #f8f4fc; }
    .admin-month-group { margin-bottom: 2px; border-radius: 8px; overflow: hidden; }
    .admin-month-group.expanded { background: #faf8fd; }
    .admin-month-header { display: flex; align-items: center; gap: 6px; padding: 10px 12px; cursor: pointer; user-select: none; border-radius: 8px; transition: background 0.15s; }
    .admin-month-header:hover { background: #f8f4fc; }
    .admin-month-icon { font-size: 10px; color: #a594dd; width: 14px; text-align: center; flex-shrink: 0; }
    .admin-month-label { font-size: 13px; font-weight: 600; color: #2b2b2b; }
    .admin-month-count { font-size: 11px; color: #999; font-weight: 400; }
    .admin-month-posts { padding: 0 0 4px 0; display: flex; flex-direction: column; gap: 3px; }
    .image-browser { border-top: 1px solid #e8e0f0; padding-top: 12px; }
    .image-browser-header { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; padding: 6px 0; }
    .image-browser-header:hover { color: #a594dd; }
    .image-browser-icon { font-size: 10px; color: #a594dd; width: 14px; text-align: center; }
    .image-browser-label { font-size: 13px; font-weight: 500; color: #666; }
    .image-browser-content { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 0 4px; }
    .image-browser-item { width: 64px; height: 64px; border-radius: 6px; overflow: hidden; cursor: pointer; border: 1px solid #e8e0f0; transition: border-color 0.15s, box-shadow 0.15s; }
    .image-browser-item:hover { border-color: #a594dd; box-shadow: 0 0 0 2px rgba(165,148,221,0.2); }
    .image-browser-item img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
<div id="app">
  <div id="admin-header" class="admin-header">
    <a class="back-link" href="/">← 返回博客</a>
    <button class="logout-btn" onclick="logout()">切换账号</button>
  </div>

  <!-- 登录页 -->
  <div id="login-view" class="login-prompt">
    <h2>使用 GitHub Token 登录</h2>
    <div class="token-input-wrap">
      <input type="password" id="token-input" placeholder="粘贴 Personal Access Token" autocomplete="off" style="width:320px">
      <button class="btn btn-primary" id="login-btn" onclick="loginWithToken()">登录</button>
    </div>
    <div class="sub" style="margin-top:8px;">需要 GitHub Token 才能发布文章</div>
    <div id="login-status" class="status" style="margin-top:12px;text-align:center"></div>
    <div class="help-text">
      如何获取 Token：<br>
      1. 打开 <a href="https://github.com/settings/tokens" target="_blank">Personal access tokens</a> → <b>Tokens (classic)</b><br>
      2. 点 <b>Generate new token (classic)</b><br>
      3. 勾选 scope <b>repo</b>（完整 repo 权限）<br>
      4. 生成后复制 token（以 ghp_ 开头）粘贴到上方输入框
    </div>
  </div>

  <!-- 编辑器 -->
  <div id="editor-view" class="editor-area">
    <div class="nav-tabs">
      <button class="nav-tab" onclick="showPosts()">管理文章</button>
      <button class="nav-tab active" onclick="">写新文章</button>
    </div>
    <h1 id="editor-title">写文章</h1>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="post-title" placeholder="今天想写点什么？" autocomplete="off">
    </div>
    <div class="form-group">
      <label>正文（支持 Markdown）</label>
      <textarea id="post-body" placeholder="用 Markdown 写下你的想法..."></textarea>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" id="publish-btn" onclick="publish()">发布</button>
      <button class="btn btn-outline btn-sm" id="upload-btn" onclick="document.getElementById('file-input').click()">上传图片</button>
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" style="display:none">
      <button class="btn btn-outline btn-sm" id="cancel-edit-btn" onclick="cancelEdit()" style="display:none">取消编辑</button>
    </div>
    <div id="status" class="status"></div>
    <!-- 已上传图片浏览 -->
    <div id="image-browser" class="image-browser" style="display:none">
      <div class="image-browser-header" onclick="toggleImageBrowser()">
        <span class="image-browser-icon">▶</span>
        <span class="image-browser-label">已上传图片</span>
      </div>
      <div id="image-browser-content" class="image-browser-content" style="display:none">
        <div class="empty-state" style="padding:20px">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 文章管理 -->
  <div id="posts-view" class="posts-view">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="">管理文章</button>
      <button class="nav-tab" onclick="showEditor()">写新文章</button>
    </div>
    <div class="posts-toolbar">
      <h1>文章管理</h1>
      <button class="btn btn-primary btn-sm" onclick="showEditor()">写新文章</button>
    </div>
    <div id="posts-list" class="posts-list-admin">
      <div class="empty-state">加载中...</div>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div id="confirm-overlay" class="confirm-overlay">
  <div class="confirm-box">
    <h3>确认删除</h3>
    <p id="confirm-text">确定要删除这篇文章吗？此操作不可恢复。</p>
    <div class="confirm-actions">
      <button class="btn btn-outline btn-sm" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger btn-sm" id="confirm-delete-btn">删除</button>
    </div>
  </div>
</div>

<script>
const REPO = 'belber/belber.github.io';
const BRANCH = 'main';

let accessToken = null;
let editingFile = null; // { path, sha } when editing existing post
let pendingImages = []; // { filename: String, dataUrl: String } 已上传但未提交到 GitHub 的图片

// === 页面初始化：从 sessionStorage 恢复 token ===
(function init() {
  var saved = sessionStorage.getItem('gh_token');
  if (saved) {
    accessToken = saved;
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('admin-header').style.display = 'flex';
    document.getElementById('posts-view').style.display = 'block';
    loadPosts();
  }
})();

// === 登录 ===
function loginWithToken() {
  var token = document.getElementById('token-input').value.trim();
  var loginStatus = document.getElementById('login-status');
  if (!token) { loginStatus.textContent = '请输入 token'; loginStatus.className = 'status error'; return; }

  var loginBtn = document.getElementById('login-btn');
  loginBtn.disabled = true;
  loginBtn.textContent = '登录中...';

  fetch('https://api.github.com/user', {
    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) {
    if (r.status === 401) throw new Error('Token 无效，请检查是否正确');
    if (!r.ok) throw new Error('验证失败 (' + r.status + ')');
    return r.json();
  })
  .then(function() {
    accessToken = token;
    sessionStorage.setItem('gh_token', token);
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('admin-header').style.display = 'flex';
    document.getElementById('posts-view').style.display = 'block';
    loadPosts();
  })
  .catch(function(err) {
    loginStatus.textContent = err.message;
    loginStatus.className = 'status error';
    loginBtn.disabled = false;
    loginBtn.textContent = '登录';
  });
}

function logout() {
  accessToken = null;
  editingFile = null;
  sessionStorage.removeItem('gh_token');
  document.getElementById('admin-header').style.display = 'none';
  document.getElementById('posts-view').style.display = 'none';
  document.getElementById('editor-view').style.display = 'none';
  document.getElementById('login-view').style.display = 'block';
}

function showStatus(msg, type) {
  var s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + type;
  s.style.display = '';
}

// === 视图切换 ===
function showPosts() {
  document.getElementById('editor-view').style.display = 'none';
  document.getElementById('posts-view').style.display = 'block';
  loadPosts();
}

function showEditor() {
  editingFile = null;
  pendingImages = [];
  document.getElementById('editor-title').textContent = '写文章';
  document.getElementById('publish-btn').textContent = '发布';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  document.getElementById('post-title').value = '';
  document.getElementById('post-body').value = '';
  document.getElementById('status').className = 'status';
  document.getElementById('status').style.display = 'none';
  document.getElementById('image-browser').style.display = 'none';
  document.getElementById('posts-view').style.display = 'none';
  document.getElementById('editor-view').style.display = 'block';
}

function cancelEdit() {
  pendingImages = [];
  showPosts();
}

// === 加载文章列表（按月分组） ===
function loadPosts() {
  var list = document.getElementById('posts-list');
  list.innerHTML = '<div class="empty-state">加载中...</div>';

  fetch('https://api.github.com/repos/' + REPO + '/contents/_posts?_=' + Date.now(), {
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) {
    if (!r.ok) throw new Error('获取文章列表失败');
    return r.json();
  })
  .then(function(files) {
    if (!files || !files.length) {
      list.innerHTML = '<div class="empty-state">还没有文章</div>';
      return;
    }

    // 按月分组
    var groups = {};
    var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    files.forEach(function(f) {
      if (f.type !== 'file' || !f.name.match(/^\d{4}-\d{2}-\d{2}-/)) return;
      var key = f.name.substring(0, 7); // YYYY-MM
      var ym = key.split('-');
      var label = monthNames[parseInt(ym[1], 10) - 1] + ' ' + ym[0];
      if (!groups[key]) groups[key] = { key: key, label: label, posts: [] };
      groups[key].posts.push(f);
    });

    var sorted = Object.keys(groups).sort().reverse();
    var expandedKey = sorted[0];

    var html = '';
    sorted.forEach(function(k) {
      var g = groups[k];
      var isExpanded = (k === expandedKey);
      html += '<div class="admin-month-group' + (isExpanded ? ' expanded' : '') + '">';
      html += '  <div class="admin-month-header" onclick="toggleAdminMonth(this)">';
      html += '    <span class="admin-month-icon">' + (isExpanded ? '▼' : '▶') + '</span>';
      html += '    <span class="admin-month-label">' + g.label + ' <span class="admin-month-count">(' + g.posts.length + ')</span></span>';
      html += '  </div>';
      html += '  <div class="admin-month-posts"' + (isExpanded ? '' : ' style="display:none"') + '>';
      g.posts.sort(function(a, b) { return b.name.localeCompare(a.name); });
      g.posts.forEach(function(f) {
        var datePart = f.name.substring(0, 10);
        var namePart = f.name.substring(11).replace(/\.md$/, '').replace(/-/g, ' ');
        html += '<div class="post-row">';
        html += '  <div class="post-info">';
        html += '    <div class="post-date">' + datePart + '</div>';
        html += '    <div class="post-name">' + escapeHtml(namePart) + '</div>';
        html += '  </div>';
        html += '  <div class="post-actions">';
        html += '    <button class="btn btn-outline btn-sm admin-edit-btn" data-path="' + escapeAttr(f.path) + '" data-sha="' + escapeAttr(f.sha) + '">编辑</button>';
        html += '    <button class="btn btn-danger btn-sm admin-delete-btn" data-name="' + escapeAttr(namePart) + '" data-path="' + escapeAttr(f.path) + '" data-sha="' + escapeAttr(f.sha) + '">删除</button>';
        html += '  </div>';
        html += '</div>';
      });
      html += '  </div>';
      html += '</div>';
    });
    list.innerHTML = html;
  })
  .catch(function(err) {
    list.innerHTML = '<div class="empty-state">加载失败：' + err.message + '</div>';
  });
}

function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function toggleAdminMonth(header) {
  var group = header.parentNode;
  var postsDiv = group.querySelector('.admin-month-posts');
  var icon = header.querySelector('.admin-month-icon');
  if (postsDiv.style.display === 'none') {
    postsDiv.style.display = '';
    icon.textContent = '▼';
    group.classList.add('expanded');
  } else {
    postsDiv.style.display = 'none';
    icon.textContent = '▶';
    group.classList.remove('expanded');
  }
}

// 事件委托：编辑 / 删除按钮
document.getElementById('posts-list').addEventListener('click', function(e) {
  var btn = e.target.closest('.admin-edit-btn');
  if (btn) {
    editPost(btn.dataset.path, btn.dataset.sha);
    return;
  }
  btn = e.target.closest('.admin-delete-btn');
  if (btn) {
    confirmDelete(btn.dataset.name, btn.dataset.path, btn.dataset.sha);
  }
});

// === 编辑文章 ===
function editPost(path, sha) {
  editingFile = null;
  document.getElementById('editor-title').textContent = '加载中...';
  document.getElementById('posts-view').style.display = 'none';
  document.getElementById('editor-view').style.display = 'block';

  fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, {
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) {
    if (!r.ok) throw new Error('加载文章失败');
    return r.json();
  })
  .then(function(data) {
    // 解码 base64 内容
    var raw = decodeURIComponent(escape(atob(data.content)));
    // 解析 front matter
    var title = '';
    var body = raw;
    var match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    if (match) {
      body = match[2].trim();
      var fmMatch = match[1].match(/title:\s*"([^"]*)"/);
      if (fmMatch) title = fmMatch[1];
    }

    editingFile = { path: path, sha: sha };
    document.getElementById('editor-title').textContent = '编辑文章';
    document.getElementById('publish-btn').textContent = '保存修改';
    document.getElementById('cancel-edit-btn').style.display = 'inline-flex';
    document.getElementById('post-title').value = title;
    document.getElementById('post-body').value = body;
    document.getElementById('status').className = 'status';
    document.getElementById('status').style.display = 'none';
    syncBrowser();
  })
  .catch(function(err) {
    showStatus('加载失败：' + err.message, 'error');
  });
}

// === 确认删除 ===
var pendingDelete = null;

function confirmDelete(name, path, sha) {
  document.getElementById('confirm-text').textContent = '确定要删除 "' + name + '" 吗？此操作不可恢复。';
  document.getElementById('confirm-overlay').classList.add('active');
  pendingDelete = { path: path, sha: sha };
  document.getElementById('confirm-delete-btn').onclick = doDelete;
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('active');
  pendingDelete = null;
}

function doDelete() {
  if (!pendingDelete) return;
  var d = pendingDelete;
  pendingDelete = null;
  closeConfirm();

  // 先读取文章内容，找出引用的图片
  fetch('https://api.github.com/repos/' + REPO + '/contents/' + d.path + '?_=' + Date.now(), {
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) {
    if (!r.ok) throw new Error('获取文章内容失败');
    return r.json();
  })
  .then(function(data) {
    var raw = decodeURIComponent(escape(atob(data.content)));
    var imgRegex = /!\[\]\(\/assets\/images\/([^)]+)\)/g;
    var images = [];
    var m;
    while ((m = imgRegex.exec(raw)) !== null) {
      images.push(m[1]);
    }
    return images;
  })
  .then(function(imagesToDelete) {
    // 删除文章
    return fetch('https://api.github.com/repos/' + REPO + '/contents/' + d.path, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({
        message: 'delete: ' + d.path,
        sha: d.sha,
        branch: BRANCH
      })
    }).then(function(r) {
      if (!r.ok) {
        return r.json().then(function(errData) {
          throw new Error(errData.message || '删除文章失败 (' + r.status + ')');
        }).catch(function(parseErr) {
          throw new Error(parseErr.message || '删除文章失败 (' + r.status + ')');
        });
      }
      return imagesToDelete;
    });
  })
  .then(function(imagesToDelete) {
    if (imagesToDelete.length === 0) return;
    // 获取每个图片的 SHA，然后删除
    var deletePromises = imagesToDelete.map(function(filename) {
      var imgPath = 'assets/images/' + encodeURI(filename);
      return fetch('https://api.github.com/repos/' + REPO + '/contents/' + imgPath + '?_=' + Date.now(), {
        headers: { 'Authorization': 'Bearer ' + accessToken, 'Accept': 'application/vnd.github.v3+json' }
      })
      .then(function(r) {
        if (r.status === 404) return null;
        if (!r.ok) return null;
        return r.json();
      })
      .then(function(imgData) {
        if (!imgData || !imgData.sha) return;
        return fetch('https://api.github.com/repos/' + REPO + '/contents/' + imgPath, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
          body: JSON.stringify({
            message: 'delete: ' + filename,
            sha: imgData.sha,
            branch: BRANCH
          })
        });
      })
      .catch(function() { /* 单个图片删除失败不阻塞整体流程 */ });
    });
    return Promise.all(deletePromises);
  })
  .then(function() {
    // 等 GitHub API 缓存刷新后再重新加载
    return new Promise(function(resolve) { setTimeout(resolve, 500); });
  })
  .then(function() {
    loadPosts();
  })
  .catch(function(err) {
    alert('删除失败：' + err.message);
  });
}

// === 发布 / 保存 ===
function publish() {
  var title = document.getElementById('post-title').value.trim();
  var body = document.getElementById('post-body').value.trim();
  if (!title) { showStatus('请输入标题', 'error'); return; }
  if (!body) { showStatus('请输入正文', 'error'); return; }

  var btn = document.getElementById('publish-btn');
  btn.disabled = true;
  btn.textContent = editingFile ? '保存中...' : '发布中...';
  showStatus('正在' + (editingFile ? '保存' : '发布') + '...', 'info');

  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var dateStr = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
  var timeStr = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  var tz = '+08:00';
  var frontMatter = '---\nlayout: post\ntitle: "' + title + '"\ndate: ' + dateStr + ' ' + timeStr + ' ' + tz + '\n---\n\n' + body;

  // === 上传正文中引用的 pending 图片 ===

  // 上传单个图片，只创建新文件，已存在则跳过
  function uploadImage(img) {
    return fetch('https://api.github.com/repos/' + REPO + '/contents/assets/images/' + img.filename, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({
        message: 'feat: upload ' + img.filename,
        content: img.dataUrl.split(',')[1],
        branch: BRANCH
      })
    }).then(function(r) {
      if (r.status === 409) return; // 文件已存在，跳过
      if (!r.ok) throw new Error('图片上传失败 (' + r.status + ')');
      return r.json();
    });
  }

  (function uploadPendingImages() {
    var bodyForRefs = document.getElementById('post-body').value;
    var refRegex = /!\[\]\(\/assets\/images\/([^)]+)\)/g;
    var refMatches = [];
    var m;
    while ((m = refRegex.exec(bodyForRefs)) !== null) {
      if (refMatches.indexOf(m[1]) === -1) refMatches.push(m[1]);
    }

    var imagesToUpload = pendingImages.filter(function(p) {
      return refMatches.indexOf(p.filename) !== -1;
    });

    if (imagesToUpload.length === 0) { submitPost(); return; }

    Promise.all(imagesToUpload.map(function(p) {
      return uploadImage(p);
    }))
    .then(function() {
      // 从 pending 中移除已提交的图片
      var uploadedFilenames = imagesToUpload.map(function(p) { return p.filename; });
      pendingImages = pendingImages.filter(function(p) {
        return uploadedFilenames.indexOf(p.filename) === -1;
      });
      // 图片上传完后继续提交文章
      submitPost();
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = editingFile ? '保存修改' : '发布';
      showStatus(err.message, 'error');
    });
  })();

  function submitPost() {
    if (editingFile) {
      // 更新已有文章
      fetch('https://api.github.com/repos/' + REPO + '/contents/' + editingFile.path, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({
          message: 'update: ' + title,
          content: btoa(unescape(encodeURIComponent(frontMatter))),
          sha: editingFile.sha,
          branch: BRANCH
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (result.message) throw new Error(result.message);
        editingFile = { path: editingFile.path, sha: result.content.sha };
        btn.textContent = '✓ 已保存';
        showStatus('文章 "' + title + '" 已更新！', 'success');
        setTimeout(function() {
          btn.disabled = false;
          btn.textContent = '保存修改';
        }, 2000);
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.textContent = '保存修改';
        showStatus('保存失败：' + (err.message || '未知错误'), 'error');
      });
    } else {
      // 新建文章
      var slug = title.toLowerCase().replace(/[^\w一-鿿]+/g, '-').replace(/^-|-$/g, '') || 'post';
      var filename = '_posts/' + dateStr + '-' + slug + '.md';

      fetch('https://api.github.com/repos/' + REPO + '/contents/' + filename, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({
          message: 'feat: ' + title,
          content: btoa(unescape(encodeURIComponent(frontMatter))),
          branch: BRANCH
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (result.message) throw new Error(result.message);
        btn.textContent = '✓ 已发布';
        showStatus('文章 "' + title + '" 已发布！', 'success');
        document.getElementById('post-title').value = '';
        document.getElementById('post-body').value = '';
        setTimeout(function() { btn.disabled = false; btn.textContent = '发布'; }, 2000);
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.textContent = '发布';
        showStatus('发布失败：' + (err.message || '未知错误'), 'error');
      });
    }
  }
}
// === 图片上传 ===
document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = '上传中...';

  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      // Canvas 压缩
      var canvas = document.createElement('canvas');
      var MAX = 1920;
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = h * MAX / w; w = MAX; }
        else { w = w * MAX / h; h = MAX; }
      }
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      var quality = 0.85;
      var dataUrl = canvas.toDataURL('image/jpeg', quality);

      // 生成文件名: YYYY-MM-DD_hhmmss_xxx.jpg
      var now = new Date();
      var pad = function(n) { return String(n).padStart(2, '0'); };
      var ds = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) +
               '_' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
      var rand = '';
      var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
      for (var i = 0; i < 3; i++) rand += chars.charAt(Math.floor(Math.random() * chars.length));
      var filename = 'assets/images/' + ds + '_' + rand + '.jpg';

      // 存入暂存区（不提交 GitHub）
      var shortName = filename.split('/').pop();
      pendingImages.push({ filename: shortName, dataUrl: dataUrl });

      var md = '![](' + '/assets/images/' + shortName + ')\n';
      var textarea = document.getElementById('post-body');
      textarea.value = textarea.value + '\n' + md;
      syncBrowser();
      btn.textContent = '✓ 已上传';
      setTimeout(function() { btn.disabled = false; btn.textContent = '上传图片'; }, 2000);
    };
    img.onerror = function() {
      alert('图片格式无效，请选择有效的图片文件');
      btn.disabled = false;
      btn.textContent = '上传图片';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  // 重置 input 以便再次选择同一文件
  e.target.value = '';
});
// === 已上传图片浏览：始终与正文中的 markdown 图片引用保持同步 ===
function toggleImageBrowser() {
  var content = document.getElementById('image-browser-content');
  var icon = document.querySelector('.image-browser-icon');
  if (content.style.display === 'none') {
    content.style.display = '';
    icon.textContent = '▼';
    syncBrowser();
  } else {
    content.style.display = 'none';
    icon.textContent = '▶';
  }
}

function syncBrowser() {
  var browser = document.getElementById('image-browser');
  var container = document.getElementById('image-browser-content');
  var icon = document.querySelector('.image-browser-icon');

  // 从正文提取 ![](/assets/images/xxx.jpg)
  var text = document.getElementById('post-body').value;
  var regex = /!\[\]\(\/assets\/images\/([^)]+)\)/g;
  var filenames = [];
  var match;
  while ((match = regex.exec(text)) !== null) {
    if (filenames.indexOf(match[1]) === -1) filenames.push(match[1]);
  }

  if (filenames.length === 0) {
    browser.style.display = 'none';
    return;
  }

  var isExpanded = container.style.display !== 'none';
  browser.style.display = '';
  container.style.display = '';
  icon.textContent = '▼';

  var html = '';
  filenames.forEach(function(name) {
    var safeName = name.replace(/"/g, '&quot;');
    var isPending = pendingImages.some(function(p) { return p.filename === name; });
    var imgSrc;
    if (isPending) {
      var pending = pendingImages.filter(function(p) { return p.filename === name; });
      imgSrc = pending.length > 0 ? pending[0].dataUrl : '';
    } else {
      imgSrc = 'https://raw.githubusercontent.com/' + REPO + '/main/assets/images/' + encodeURI(name);
    }
    html += '<div class="image-browser-item" data-filename="' + safeName + '" title="' + safeName + '">';
    html += '  <img src="' + imgSrc + '" alt="' + safeName + '">';
    html += '</div>';
  });
  container.innerHTML = html;

  // 点击缩略图预览大图
  container.onclick = function(e) {
    var item = e.target.closest('.image-browser-item');
    if (item) {
      previewImage(item.dataset.filename);
    }
  };
}

// 监听正文变化，自动同步已上传图片列表
var syncTimer = null;
document.getElementById('post-body').addEventListener('input', function() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(syncBrowser, 200);
});

function insertImage(filename) {
  var md = '![](' + '/assets/images/' + filename + ')\n';
  var textarea = document.getElementById('post-body');
  textarea.value = textarea.value + '\n' + md;
}

// === 图片预览 ===
function previewImage(filename) {
  var overlay = document.getElementById('preview-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'preview-overlay';
    overlay.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center;cursor:zoom-out';
    overlay.onclick = function(e) {
      if (e.target === overlay) closePreview();
    };
    document.body.appendChild(overlay);
  }

  overlay.innerHTML = '';

  var isPending = pendingImages.some(function(p) { return p.filename === filename; });
  var imgSrc;
  if (isPending) {
    var pending = pendingImages.filter(function(p) { return p.filename === filename; });
    imgSrc = pending.length > 0 ? pending[0].dataUrl : '';
  } else {
    imgSrc = 'https://raw.githubusercontent.com/' + REPO + '/main/assets/images/' + encodeURI(filename);
  }

  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:relative;display:flex;flex-direction:column;align-items:center;gap:12px';

  var img = document.createElement('img');
  img.src = imgSrc;
  img.style.cssText = 'max-width:90vw;max-height:80vh;border-radius:4px;box-shadow:0 4px 32px rgba(0,0,0,0.4);object-fit:contain;cursor:default';

  var btn = document.createElement('button');
  btn.textContent = '插入图片';
  btn.style.cssText = 'padding:8px 20px;background:#a594dd;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer';
  btn.onclick = function() {
    insertImage(filename);
    closePreview();
  };

  wrapper.appendChild(img);
  wrapper.appendChild(btn);
  overlay.appendChild(wrapper);

  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closePreview() {
  var overlay = document.getElementById('preview-overlay');
  if (overlay) {
    overlay.style.display = 'none';
    overlay.innerHTML = '';
  }
  document.body.style.overflow = '';
}

// ESC 关闭预览
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePreview();
});
